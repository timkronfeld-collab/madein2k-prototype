<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root{ color-scheme:light; --ink:#0d0d0d; --paper:#fff; --ink-2:#565656; --ink-3:#6d6d6d; --line:#e8e8e8; --ease:cubic-bezier(.22,.61,.21,1); --wrap:820px; }
body{ font-family:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif; background:var(--paper); color:var(--ink); font-size:17px; line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
a{ color:inherit; }
::selection{ background:var(--ink); color:var(--paper); }
:focus-visible{ outline:2px solid var(--ink); outline-offset:3px; border-radius:2px; }
.container{ max-width:var(--wrap); margin-inline:auto; padding-inline:clamp(20px,5vw,48px); }
.sqz{ display:inline-block; transform:scaleX(.92); transform-origin:left center; }
.nav{ border-bottom:1px solid var(--line); }
.nav__inner{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding-block:15px; max-width:1160px; margin-inline:auto; padding-inline:clamp(20px,5vw,48px); }
.wordmark{ font-weight:800; font-size:18px; letter-spacing:-.03em; text-decoration:none; }
.nav__back{ font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); text-decoration:none; }
.nav__back:hover{ color:var(--ink); }
.legal{ padding-block:clamp(3rem,8vw,5.5rem); }
.legal h1{ font-weight:800; font-size:clamp(2.4rem,7vw,4rem); line-height:.95; letter-spacing:-.04em; text-transform:uppercase; margin-bottom:clamp(2rem,5vw,3rem); }
.legal h2{ font-size:12px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-3); margin-top:2.4rem; margin-bottom:.6rem; }
.legal p{ margin-bottom:.35rem; }
.legal a{ color:var(--ink); }
.footer{ border-top:1px solid var(--line); padding-block:26px; margin-top:clamp(2rem,5vw,3rem); }
.footer__inner{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; max-width:1160px; margin-inline:auto; padding-inline:clamp(20px,5vw,48px); }
.footer__legal{ display:flex; gap:24px; }
.footer__legal a{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); text-decoration:none; }
.footer__legal a:hover{ color:var(--ink); }
</style>
</head>
<body>

<header class="nav">

</main>

<footer class="footer">
